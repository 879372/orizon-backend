[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python scripts/backup_db.py"
cronSchedule = "0 3 * * *"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.regions]]
region = "us-east"
cpuLimit = 1000
memoryLimit = 1024
